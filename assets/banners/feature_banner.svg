<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="100%" height="100%">
  <defs>
    <rect id="bg" width="1000" height="400" fill="#0b0b14"/>
  </defs>

  <use href="#bg"/>

  <text x="500" y="45" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="1">KEY CORE FEATURES</text>

  <!-- Feature 1 -->
  <g transform="translate(60, 100)">
    <rect width="260" height="220" rx="10" fill="#131322" stroke="#3b82f6" stroke-width="1.5" />
    <text x="30" y="45" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="14" font-weight="800">Chunked Saving</text>
    <text x="30" y="80" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">
      <tspan x="30" dy="0">Conquers browser message</tspan>
      <tspan x="30" dy="18">buffer limitations by splitting</tspan>
      <tspan x="30" dy="18">massive payloads into 50KB</tspan>
      <tspan x="30" dy="18">packets cleanly.</tspan>
    </text>
  </g>

  <!-- Feature 2 -->
  <g transform="translate(370, 100)">
    <rect width="260" height="220" rx="10" fill="#131322" stroke="#8b5cf6" stroke-width="1.5" />
    <text x="30" y="45" fill="#c084fc" font-family="system-ui, sans-serif" font-size="14" font-weight="800">Supabase Cloud</text>
    <text x="30" y="80" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">
      <tspan x="30" dy="0">Ensures seamless database</tspan>
      <tspan x="30" dy="18">sync across multiple devices</tspan>
      <tspan x="30" dy="18">using local JS SDK bindings</tspan>
      <tspan x="30" dy="18">and robust session auth.</tspan>
    </text>
  </g>

  <!-- Feature 3 -->
  <g transform="translate(680, 100)">
    <rect width="260" height="220" rx="10" fill="#131322" stroke="#10b981" stroke-width="1.5" />
    <text x="30" y="45" fill="#10b981" font-family="system-ui, sans-serif" font-size="14" font-weight="800">Fallback Protection</text>
    <text x="30" y="80" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="11">
      <tspan x="30" dy="0">Offline mode switches</tspan>
      <tspan x="30" dy="18">automatically to local storage</tspan>
      <tspan x="30" dy="18">caching if network connection</tspan>
      <tspan x="30" dy="18">fails or keys are empty.</tspan>
    </text>
  </g>
</svg>
