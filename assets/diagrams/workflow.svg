<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="100%" height="100%">
  <defs>
    <rect id="bg" width="900" height="480" fill="#0b0b14"/>
    <linearGradient id="grad-step" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" opacity="0.1"/>
    </linearGradient>
  </defs>

  <use href="#bg"/>

  <text x="450" y="38" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="1">END-TO-END DATA WORKFLOW</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Chronological journey of a capsule from scratch to cloud</text>

  <!-- Step Boxes -->
  <g transform="translate(100, 100)">
    <!-- Step 1 -->
    <rect width="700" height="46" rx="8" fill="url(#grad-step)" stroke="rgba(255,255,255,0.05)" />
    <circle cx="30" cy="23" r="12" fill="#3b82f6" />
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="700">1</text>
    <text x="60" y="27" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Trigger Capture</text>
    <text x="210" y="27" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">User clicks floating capture button on ChatGPT/Claude DOM</text>
  </g>

  <g transform="translate(100, 155)">
    <!-- Step 2 -->
    <rect width="700" height="46" rx="8" fill="url(#grad-step)" stroke="rgba(255,255,255,0.05)" />
    <circle cx="30" cy="23" r="12" fill="#3b82f6" />
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="700">2</text>
    <text x="60" y="27" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Extract Messages</text>
    <text x="210" y="27" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">DOM Scraper safely traverses lazy-loaded conversation nodes</text>
  </g>

  <g transform="translate(100, 210)">
    <!-- Step 3 -->
    <rect width="700" height="46" rx="8" fill="url(#grad-step)" stroke="rgba(255,255,255,0.05)" />
    <circle cx="30" cy="23" r="12" fill="#3b82f6" />
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="700">3</text>
    <text x="60" y="27" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Apply System Context</text>
    <text x="210" y="27" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Prepends developer/author branding and splits payload into 50KB chunks</text>
  </g>

  <g transform="translate(100, 265)">
    <!-- Step 4 -->
    <rect width="700" height="46" rx="8" fill="url(#grad-step)" stroke="rgba(255,255,255,0.05)" />
    <circle cx="30" cy="23" r="12" fill="#8b5cf6" />
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="700">4</text>
    <text x="60" y="27" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Sequential Messaging</text>
    <text x="210" y="27" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Transmits chunks to background thread via chrome.runtime messaging</text>
  </g>

  <g transform="translate(100, 320)">
    <!-- Step 5 -->
    <rect width="700" height="46" rx="8" fill="url(#grad-step)" stroke="rgba(255,255,255,0.05)" />
    <circle cx="30" cy="23" r="12" fill="#8b5cf6" />
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="700">5</text>
    <text x="60" y="27" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Assemble &amp; Cache</text>
    <text x="210" y="27" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Background service compiles fragments, writes to chrome.storage.local</text>
  </g>

  <g transform="translate(100, 375)">
    <!-- Step 6 -->
    <rect width="700" height="46" rx="8" fill="url(#grad-step)" stroke="rgba(255,255,255,0.05)" />
    <circle cx="30" cy="23" r="12" fill="#10b981" />
    <text x="30" y="27" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="700">6</text>
    <text x="60" y="27" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Supabase Sync</text>
    <text x="210" y="27" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Performs upsert over client session mapping data cleanly to cloud database</text>
  </g>

  <!-- Flow Lines -->
  <line x1="450" y1="146" x2="450" y2="154" stroke="#4b5563" stroke-width="2" />
  <line x1="450" y1="201" x2="450" y2="209" stroke="#4b5563" stroke-width="2" />
  <line x1="450" y1="256" x2="450" y2="264" stroke="#4b5563" stroke-width="2" />
  <line x1="450" y1="311" x2="450" y2="319" stroke="#4b5563" stroke-width="2" />
  <line x1="450" y1="366" x2="450" y2="374" stroke="#4b5563" stroke-width="2" />
</svg>
