<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <rect id="bg" width="800" height="480" fill="#0b0b14"/>
  </defs>

  <use href="#bg"/>

  <text x="400" y="38" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="20" font-weight="800" letter-spacing="1">COMPONENT INTER-DEPENDENCY MAP</text>
  <text x="400" y="58" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Dependencies and file import graph</text>

  <!-- Components layout -->
  <g transform="translate(300, 100)">
    <rect width="200" height="50" rx="6" fill="#131322" stroke="#8b5cf6" stroke-width="1.5" />
    <text x="100" y="30" text-anchor="middle" fill="#c084fc" font-family="system-ui, sans-serif" font-size="12" font-weight="700">lib/storage.js</text>
  </g>

  <g transform="translate(100, 220)">
    <rect width="200" height="50" rx="6" fill="#131322" stroke="#3b82f6" stroke-width="1.5" />
    <text x="100" y="30" text-anchor="middle" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="12" font-weight="700">popup/popup.js</text>
  </g>

  <g transform="translate(500, 220)">
    <rect width="200" height="50" rx="6" fill="#131322" stroke="#ec4899" stroke-width="1.5" />
    <text x="100" y="30" text-anchor="middle" fill="#f472b6" font-family="system-ui, sans-serif" font-size="12" font-weight="700">sidebar/sidebar.js</text>
  </g>

  <g transform="translate(300, 340)">
    <rect width="200" height="50" rx="6" fill="#131322" stroke="#10b981" stroke-width="1.5" />
    <text x="100" y="30" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="12" font-weight="700">lib/supabase-js.js</text>
  </g>

  <!-- Connective Arrows -->
  <path d="M 300 245 L 200 245" fill="none" stroke="#4b5563" stroke-width="1.5" />
  <path d="M 400 150 L 200 220" fill="none" stroke="#4b5563" stroke-width="1.5" />
  <path d="M 400 150 L 600 220" fill="none" stroke="#4b5563" stroke-width="1.5" />
  <path d="M 200 270 L 400 340" fill="none" stroke="#4b5563" stroke-width="1.5" />
  <path d="M 600 270 L 400 340" fill="none" stroke="#4b5563" stroke-width="1.5" />
</svg>
